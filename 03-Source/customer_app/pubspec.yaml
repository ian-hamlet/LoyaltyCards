name: customer_app
description: "LoyaltyCards Customer App - Digital loyalty card wallet"
publish_to: 'none'

version: 0.2.0+21

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Shared package with core models and utilities
  shared:
    path: ../shared

  # QR Code Generation & Scanning
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  
  # Database
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.9.0
  
  # Utilities
  crypto: ^3.0.3
  uuid: ^4.3.0
  intl: ^0.20.2
  pointycastle: ^4.0.0
  device_info_plus: ^11.2.0
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^8.0.2
  
  # Preferences
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/

