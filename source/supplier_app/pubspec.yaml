name: supplier_app
description: "LoyaltyCards Business App - Issue and manage loyalty cards"
publish_to: 'none'

version: 0.3.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Shared package with core models and utilities
  shared:
    path: ../shared

  # QR Code Generation & Scanning
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  
  # Database
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.9.0
  
  # Cryptography
  crypto: ^3.0.3
  pointycastle: ^4.0.0
  
  # Secure Storage
  flutter_secure_storage: ^10.0.0
  
  # Biometric Authentication (Face ID / Touch ID / Passcode)
  local_auth: ^3.0.1
  
  # Utilities
  uuid: ^4.3.0
  intl: ^0.20.2
  shared_preferences: ^2.3.3
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^8.0.2
  
  # Backup Storage Options
  image_gallery_saver: ^2.0.3  # Save QR to photo gallery - latest available
  share_plus: ^12.0.2           # Share via email/files (updated for testing)
  printing: ^5.13.4             # Print PDF functionality
  pdf: ^3.11.1                  # Generate PDF documents

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.0
  build_runner: ^2.4.0
  test: ^1.24.0
  sqflite_common_ffi: ^2.3.0  # For desktop testing

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/

